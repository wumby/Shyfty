services:
  postgres:
    image: postgres:16
    container_name: shyfty-postgres
    environment:
      POSTGRES_DB: shyfty
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
    container_name: shyfty-backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/shyfty
    ports:
      - "8001:8001"
    depends_on:
      - postgres

volumes:
  postgres_data:

